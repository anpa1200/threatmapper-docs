<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Black background -->
  <rect width="64" height="64" rx="8" fill="#000000"/>

  <!-- Parrot head silhouette — white, profile facing right -->
  <!-- Main head -->
  <circle cx="24" cy="22" r="13" fill="#ffffff"/>
  <!-- Upper beak, hooked downward -->
  <path d="M 35,18 Q 47,15 48,23 Q 46,30 36,27 Z" fill="#ffffff"/>
  <!-- Lower beak / mandible -->
  <path d="M 35,27 Q 44,30 42,37 Q 36,40 32,35 Z" fill="#ffffff"/>
  <!-- Eye black -->
  <circle cx="28" cy="18" r="3.5" fill="#000000"/>
  <!-- Eye highlight -->
  <circle cx="29" cy="17" r="1.3" fill="#ffffff"/>
  <!-- Neck / body hint -->
  <path d="M 13,31 Q 15,41 21,44 Q 27,46 30,42 L 28,38 Q 24,40 20,38 Q 16,34 14,31 Z" fill="#ffffff"/>

  <!-- Cyan padlock — lower right -->
  <!-- Shackle arc -->
  <path d="M 37,50 L 37,44 Q 37,37 44,37 Q 51,37 51,44 L 51,50"
        fill="none" stroke="#00e5ff" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Lock body -->
  <rect x="33" y="50" width="22" height="12" rx="3" fill="#00e5ff"/>
  <!-- Keyhole circle -->
  <circle cx="44" cy="55" r="2.8" fill="#000000"/>
  <!-- Keyhole slot -->
  <rect x="42.8" y="55" width="2.4" height="5" fill="#000000"/>
</svg>
